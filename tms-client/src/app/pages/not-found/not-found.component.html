<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-slate-100" @fadeIn>
  <div class="text-center px-6">
    <div class="flex items-center justify-center w-24 h-24 rounded-3xl bg-primary-100 text-primary-600 mx-auto mb-6">
      <mat-icon class="text-5xl">explore_off</mat-icon>
    </div>
    <h1 class="text-7xl font-extrabold text-primary-600 mb-2">404</h1>
    <h2 class="text-2xl font-bold text-slate-800 mb-3">Page Not Found</h2>
    <p class="text-slate-500 mb-8 max-w-md mx-auto">
      The page you're looking for doesn't exist or has been moved.
    </p>
    <div class="flex items-center justify-center gap-4">
      <a routerLink="/dashboard" mat-raised-button color="primary" class="rounded-xl">
        <mat-icon class="mr-1">home</mat-icon>
        Go to Dashboard
      </a>
      <a routerLink="/login" mat-stroked-button class="rounded-xl">
        <mat-icon class="mr-1">login</mat-icon>
        Back to Login
      </a>
    </div>
  </div>
</div>
